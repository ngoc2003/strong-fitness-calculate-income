<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tính lương PT</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; font-family: 'Poppins'; }

    body {
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #6a11cb);
      color: white;
      padding: 20px;
    }

    h1 { text-align: center; }

    .container { max-width: 900px; margin: auto; }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      width: 130px;
    }

    .row { display: flex; flex-wrap: wrap; gap: 10px; }

    button {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      background: #4facfe;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #3a8ee6; }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    tr { background: rgba(255,255,255,0.08); }

    .delete { background: #ff4d6d; }

    .result {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .box {
      background: rgba(255,255,255,0.15);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .total { font-weight: bold; font-size: 20px; }
  </style>
</head>
<body>

<h1>Tính lương PT</h1>

<div class="container">

  <!-- TARGET -->
  <div class="card">
    <h3>Target</h3>
    <input type="number" id="target" placeholder="Doanh thu">
    <div id="levelInfo"></div>
  </div>

  <!-- KHÁCH -->
  <div class="card">
    <h3>Khách dạy</h3>

    <div class="row">
      <input id="name" placeholder="Tên">
      <input id="price" type="number" placeholder="Giá / buổi">
      <input id="sessions" type="number" placeholder="Số buổi">
      <input id="percentInput" type="number" placeholder="% com">
      <button onclick="addStudent()">Thêm</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Tên</th>
          <th>% com</th>
          <th>Giá</th>
          <th>Buổi</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

  <!-- RESULT -->
  <div class="card">
    <button onclick="calculate()">Tính lương</button>
    <div class="result" id="result"></div>
  </div>

</div>

<script>
let students = [];
let currentLevel = null;

// mapping theo bảng
function getLevel(target) {
  if (target < 20000000) return { base: 3000000, sale: 0.01, teach: 0.10 };
  if (target < 30000000) return { base: 3500000, sale: 0.02, teach: 0.15 };
  if (target < 40000000) return { base: 4000000, sale: 0.03, teach: 0.20 };
  if (target < 50000000) return { base: 4500000, sale: 0.04, teach: 0.25 };
  if (target < 60000000) return { base: 5000000, sale: 0.05, teach: 0.30 };
  if (target < 70000000) return { base: 5500000, sale: 0.06, teach: 0.32 };
  return { base: 6000000, sale: 0.07, teach: 0.35 };
}

// xử lý khi nhập target
function handleTarget() {
  const target = parseFloat(document.getElementById("target").value);
  if (!target) return;

  currentLevel = getLevel(target);

  document.getElementById("levelInfo").innerHTML = `
    Lương CB: ${currentLevel.base.toLocaleString()} |
    Com bán: ${currentLevel.sale * 100}% |
    Com dạy: ${currentLevel.teach * 100}%
  `;

  // auto fill % com dạy
  document.getElementById("percentInput").value = currentLevel.teach * 100;
}

// gắn event đúng chuẩn (fix lỗi)
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("target").addEventListener("input", handleTarget);
});

// thêm khách
function addStudent() {
  if (!currentLevel) return alert("Nhập target trước!");

  const name = document.getElementById("name").value;
  const price = parseFloat(document.getElementById("price").value);
  const sessions = parseInt(document.getElementById("sessions").value);
  const percent = parseFloat(document.getElementById("percentInput").value) / 100;

  if (!name || !price || !sessions || !percent) {
    alert("Nhập đủ thông tin!");
    return;
  }

  students.push({ name, price, sessions, percent });
  render();
}

// render bảng
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  students.forEach((s, i) => {
    list.innerHTML += `
      <tr>
        <td>${s.name}</td>
        <td>
          <input type="number" value="${s.percent * 100}" 
            onchange="updatePercent(${i}, this.value)">
        </td>
        <td>${s.price.toLocaleString()}</td>
        <td>${s.sessions}</td>
        <td><button class="delete" onclick="remove(${i})">X</button></td>
      </tr>
    `;
  });
}

// update %
function updatePercent(index, value) {
  students[index].percent = parseFloat(value) / 100;
}

// xoá
function remove(index) {
  students.splice(index, 1);
  render();
}

// tính lương
function calculate() {
  const target = parseFloat(document.getElementById("target").value);
  if (!target || !currentLevel) return alert("Nhập target!");

  const saleCom = target * currentLevel.sale;

  let teachCom = 0;
  students.forEach(s => {
    teachCom += s.price * s.sessions * s.percent;
  });

  const total = currentLevel.base + saleCom + teachCom;

  document.getElementById("result").innerHTML = `
    <div class="box">Lương CB<br>${currentLevel.base.toLocaleString()}</div>
    <div class="box">Com bán<br>${saleCom.toLocaleString()}</div>
    <div class="box">Com dạy<br>${teachCom.toLocaleString()}</div>
    <div class="box total">Tổng<br>${total.toLocaleString()} VNĐ</div>
  `;
}
</script>

</body>
</html>
